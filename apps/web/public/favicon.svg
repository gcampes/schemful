  <!-- Green chevron prompt > -->
  <path d="M6 16 L10 12 L6 8" stroke="#22c55e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none" transform="translate(0, 4)"/>
  <!-- White ct text -->
  <text x="14" y="20.5" font-family="ui-monospace, monospace" font-weight="600" font-size="12" fill="white">ct</text>
  <!-- Green cursor -->
